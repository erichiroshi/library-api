name: CI - Library API

on:
  push:
    branches: [ "main", "develop", "microservices" ]
  pull_request:
    branches: [ "main" ]

jobs:
  
  # ─────────────────────────────────────────────
  # MONOLITO
  # ─────────────────────────────────────────────

  test-monolith:
    name: Test — monolith
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: library-api   # ← todos os steps rodam dentro de library-api/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Necessário para SonarCloud analisar deltas corretamente

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build + Test + Coverage
        run: ./gradlew clean build --quiet  # ← Reduz logs

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: true
          verbose: false

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  test-microservices:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false   # ← não cancela os outros se um falhar
      matrix:
        service:
          - config-server
          - eureka-server
          - gateway
          - auth-service
          - catalog-service
          - loan-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build + Test
        run: ./gradlew clean build --quiet          