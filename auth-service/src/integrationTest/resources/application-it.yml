spring:
  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:tc:postgresql:16:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      connection-init-sql: SET search_path TO auth,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': auth

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    default-schema: auth
    schemas: auth
    baseline-on-migrate: true

  cache:
    type: none

eureka:
  client:
    enabled: false

jwt:
  secret-key: test-secret-key-for-integration-tests-that-must-be-at-least-256-bits-long
  access-token-seconds: 900
  refresh-token-days: 7
