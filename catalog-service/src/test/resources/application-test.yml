spring:
  autoconfigure:
    exclude:
      - com.example.catalogservice.aws.S3Config
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        '[default_schema]': catalog

  cache:
    type: none

aws:
  access-key-id: fake-key
  secret-access-key: fake-secret

s3:
  bucket: test-bucket
  region: us-east-1

img:
  prefix:
    book: book-
  maxWidth: 400