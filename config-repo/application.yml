# Configurações compartilhadas por todos os microservices
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true
    metadata-map:
      management.port: 8090

management:
  server:
    port: 8090      # ← porta fixa só para actuator, independente da porta do servidor
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    propagation:
      type: w3c     # TRACING — Micrometer + OpenTelemetry
    sampling:
      probability: 1.0      # 10% em prod — ajustável via env
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

# Logging
logging:
  level:
    root: INFO
    '[com.example.library]': INFO
    '[org.springframework.web]': WARN
    '[org.hibernate]': WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30