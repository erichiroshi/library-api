server:
  port: ${PORT:0}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    hikari:
      connection-init-sql: SET search_path TO auth,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': auth

  flyway:
    enabled: true
    locations: 
      - classpath:db/migration
      - classpath:db/migration/dev
    default-schema: auth
    schemas: auth
    baseline-on-migrate: true

jwt:
  secret-key: dev-insecure-key-for-local-development-only-do-not-use-in-production
  access-token-seconds: 900
  refresh-token-days: 7

logging:
  level:
    '[com.example.authservice]': DEBUG