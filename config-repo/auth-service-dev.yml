server:
  port: ${PORT:0}   # porta aleatória — Eureka cuida da descoberta
  
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    hikari:
      connection-init-sql: SET search_path TO auth,public

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': auth

  flyway:
    enabled: true
    locations: 
      - classpath:db/migration
      - classpath:db/dev_migration
    default-schema: auth
    schemas: auth
    baseline-on-migrate: true

jwt:
  secret-key: dev-insecure-key-for-local-development-only-do-not-use-in-production
  access-token-seconds: 900
  refresh-token-days: 7

# ACTUATOR
management:
  server:
    port: 8091  # actuator porta do serviço para prometheus

# Springdoc
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    persist-authorization: true   # token sobrevive ao F5
    tags-sorter: alpha            # remove — deixa na ordem do OpenApiConfig       

logging:
  level:
    '[com.example.authservice]': DEBUG