server:
  port: 0   # porta aleatória — Eureka cuida da descoberta

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/library}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-init-sql: SET search_path TO auth,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': auth

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: auth
    schemas: auth
    baseline-on-migrate: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-seconds: ${JWT_ACCESS_TOKEN_SECONDS:900}
  refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}