server:
  port: ${PORT:0}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    hikari:
      connection-init-sql: SET search_path TO catalog,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': catalog

  flyway:
    enabled: true
    locations: 
      - classpath:db/migration
      - classpath:db/dev_migration
    default-schema: catalog
    schemas: catalog
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

aws:
  access-key-id: fake-key
  secret-access-key: fake-secret

s3:
  bucket: library-api-s3
  region: sa-east-1

img:
  prefix:
    book: book-
  maxWidth: 400

logging:
  level:
    '[com.example.catalogservice]': DEBUG