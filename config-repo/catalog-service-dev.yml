server:
  port: ${PORT:0}   # porta aleatória — Eureka cuida da descoberta

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    hikari:
      connection-init-sql: SET search_path TO catalog,public

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': catalog

  flyway:
    enabled: true
    locations: 
      - classpath:db/migration
      - classpath:db/dev_migration
    default-schema: catalog
    schemas: catalog
    baseline-on-migrate: true

  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          min-idle: 0

  jackson:
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

aws:
  access-key-id: fake-key
  secret-access-key: fake-secret

s3:
  bucket: library-api-s3
  region: sa-east-1

img:
  prefix:
    book: book-
  maxWidth: 400

# Springdoc
springdoc:
  api-docs:
    enabled: true
# SWAGGER UI
  swagger-ui:
    enabled: true
    persist-authorization: true   # token sobrevive ao F5
    tags-sorter: alpha            # remove — deixa na ordem do OpenApiConfig    

logging:
  level:
    '[com.example.catalogservice]': DEBUG