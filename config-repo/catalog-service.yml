server:
  port: 0

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/library}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-init-sql: SET search_path TO catalog,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': catalog

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: catalog
    schemas: catalog
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

aws:
  access-key-id: ${AWS_KEY}
  secret-access-key: ${AWS_SECRET}

s3:
  bucket: ${BUCKET_NAME:library-api-s3}
  region: ${BUCKET_REGION:sa-east-1}

img:
  prefix:
    book: book-
  maxWidth: 400