server:
  port: ${PORT:0}   # porta aleatória — Eureka cuida da descoberta

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-init-sql: SET search_path TO lending,public

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': lending
        '[format_sql]': false

  flyway:
    enabled: true
    locations: 
      - classpath:db/migration
      - classpath:db/dev_migration
    default-schema: lending
    schemas: lending
    baseline-on-migrate: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true

resilience4j:
  circuitbreaker:
    instances:
      catalog-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      auth-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

# Springdoc
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    persist-authorization: true   # token sobrevive ao F5
    tags-sorter: alpha            # remove — deixa na ordem do OpenApiConfig          

logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG       