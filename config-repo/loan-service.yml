server:
  port: ${PORT:0}   # porta aleatória — Eureka cuida da descoberta

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-init-sql: SET search_path TO lending,public

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': lending

  flyway:
    enabled: true
    locations: 
      - classpath:db/migration
      - classpath:db/dev_migration
    default-schema: lending
    schemas: lending
    baseline-on-migrate: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true

resilience4j:
  circuitbreaker:
    instances:
      catalog-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      auth-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

# Springdoc
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false        