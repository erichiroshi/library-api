server:
  port: 0

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/library}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-init-sql: SET search_path TO lending,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': lending

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: lending
    schemas: lending
    baseline-on-migrate: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

resilience4j:
  circuitbreaker:
    instances:
      catalog-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      auth-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3