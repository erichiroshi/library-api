spring:
  application:
    name: eureka-server

# Fallback local — usado quando Config Server não está disponível
  config:
    import: optional:configserver:http://localhost:8888  # ← busca config do Config Server

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0
