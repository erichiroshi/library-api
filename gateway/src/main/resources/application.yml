spring:
  application:
    name: gateway

# Fallback local — usado quando Config Server não está disponível
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret-key: dev-insecure-key-for-local-development-only-do-not-use-in-production

logging:
  level:
    '[com.example.gateway]': DEBUG
    '[org.springframework.cloud.gateway]': DEBUG