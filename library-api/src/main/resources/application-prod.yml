spring:
  datasource:
    url: ${DB_URL}	#usar postgres no docker, localhost local
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# HikariCP
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000  # 1min (detect leaks)

# JPA/Hibernate
  jpa:
    show-sql: false

# Flyway
  flyway:
    locations: 
      - classpath:db/migration/common
    clean-disabled: true

# Redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          min-idle: 2

# TRACING — Micrometer + OpenTelemetry + Actuator
management:
  tracing:
   sampling:
     probability: ${TRACING_SAMPLING_PROBABILITY:0.1}  # 10% em prod — ajustável via env
   export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        '[http.server.request]': true
      percentiles:
        '[http.server.requests]': 0.5, 0.95, 0.99

# Logging
logging:
  level:
    root: INFO
    '[com.example.library]': INFO
    '[org.springframework.web]': WARN
    '[org.hibernate]': WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# Springdoc
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Configurações de segurança e JWT
jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-seconds: ${JWT_ACCESS_TOKEN-SECONDS:900}
  refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
