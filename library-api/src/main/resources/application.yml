spring:
  application:
    name: library

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# JPA/Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': public
        '[jdbc.batch_size]': 20
        '[order_inserts]': true
        '[order_updates]': true
        '[jakarta.persistence.schema-generation.scripts.action]': none

  datasource:
    hikari:
      connection-init-sql: SET search_path TO auth,catalog,lending,public 

# Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: public      # ← Flyway sempre usa public
    schemas: public             # ← Flyway só gerencia public

# Redis
  cache:
    type: redis
  data:
    redis:
      port: 6379
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
      repositories:
        enabled: false

# SCHEDULED TASKS
  task:
    scheduling:
      pool:
        size: 2

  jackson:
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# TRACING — Micrometer + OpenTelemetry
management:
  tracing:
    propagation:
      type: w3c

# IMAGE - S3
img:
  prefix:
    book: book-
  maxWidth: 400

# AWS - Credencials
aws:
  access-key-id: ${AWS_KEY}
  secret-access-key: ${AWS_SECRET}
s3:
  bucket: ${BUCKET_NAME:library-api-s3}
  region: ${BUCKET_REGION:sa-east-1}

# Resilience4j — CircutBreaker + Retry
resilience4j:
  circuitbreaker:
    instances:
      s3:
        sliding-window-size: 5              # janela de 5 chamadas para calcular taxa de falha
        failure-rate-threshold: 60          # abre se 60% das chamadas falharem (3 de 5)
        wait-duration-in-open-state: 30s    # fica OPEN por 30s antes de tentar recuperar
        permitted-number-of-calls-in-half-open-state: 3   # 3 chamadas de teste no HALF-OPEN
        register-health-indicator: true     # /actuator/health

  retry:
    instances:
      database:
        maxAttempts: 3          # tenta no máximo 3 vezes
        waitDuration: 500ms     # espera 500ms entre tentativas
        retryExceptions:        # só faz retry nessas exceções específicas
          - org.springframework.dao.TransientDataAccessException
          - org.springframework.dao.QueryTimeoutException