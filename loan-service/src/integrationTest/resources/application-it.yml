spring:
  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:tc:postgresql:16:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      connection-init-sql: SET search_path TO lending,public

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[default_schema]': lending

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    default-schema: lending
    schemas: lending
    baseline-on-migrate: true

  cache:
    type: none

eureka:
  client:
    enabled: false
