global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'gateway'
          environment: 'dev'      

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8091']
        labels:
          service: 'auth-service'
          environment: 'dev'

  - job_name: 'catalog-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8092']
        labels:
          service: 'catalog-service'
          environment: 'dev'

  - job_name: 'loan-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8093']
        labels:
          service: 'loan-service'
          environment: 'dev'      