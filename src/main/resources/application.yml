spring:
  application:
    name: library
    
  jpa:
    open-in-view: false
    properties:
      hibernate:
        '[default_schema]': public
        '[jdbc.batch_size]': 20
        '[order_inserts]': true
        '[order_updates]': true
        '[jakarta.persistence.schema-generation.scripts.action]': none

  datasource:
    hikari:
      connection-init-sql: SET search_path TO auth,catalog,lending,public 
  
  jackson:
    default-property-inclusion: non_null
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

img:
  prefix:
    book: book-
  maxWidth: 400

aws:
  access-key-id: ${AWS_KEY}
  secret-access-key: ${AWS_SECRET}
s3:
  bucket: ${BUCKET_NAME:library-api-s3}
  region: ${BUCKET_REGION:sa-east-1}

resilience4j:
  circuitbreaker:
    instances:
      s3:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

  retry:
    instances:
      s3:
        max-attempts: 3
        wait-duration: 500ms